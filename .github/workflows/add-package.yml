name: Add package

on:
  repository_dispatch:
    types: [new-release]

permissions:
  contents: write

jobs:
  add:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install reprepro
        run: sudo apt-get install -y reprepro

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.gnupg ~/.local/bin && chmod 700 ~/.gnupg

          # Custom pinentry: reads passphrase from ~/.gnupg/.pinentry-pass written below.
          # The daemon may not pass arbitrary env vars to child processes, so a file under
          # $HOME/.gnupg (which IS inherited) is the reliable hand-off mechanism.
          # Script is base64-encoded to avoid heredoc indentation issues in YAML block scalars.
          echo "" \
            | base64 -d > ~/.local/bin/pinentry-env
          chmod +x ~/.local/bin/pinentry-env

          # Write passphrase to file; strip trailing newline (op CLI appends one)
          printf '%s' "${GPG_PASSPHRASE%$'\n'}" > ~/.gnupg/.pinentry-pass
          chmod 600 ~/.gnupg/.pinentry-pass

          # Kill any running agent; wait for socket to disappear before writing config
          gpgconf --kill gpg-agent 2>/dev/null || true
          SOCK=$(gpgconf --list-dirs agent-socket 2>/dev/null || true)
          [ -n "$SOCK" ] && timeout 3 bash -c "while [ -S '$SOCK' ]; do sleep 0.1; done" || true
          printf 'pinentry-program %s/.local/bin/pinentry-env\n' "$HOME" > ~/.gnupg/gpg-agent.conf
          gpgconf --launch gpg-agent

          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          FINGERPRINT=$(gpg --with-colons --list-secret-keys | awk -F: '/^fpr/{print $10; exit}')
          echo "${FINGERPRINT}:6:" | gpg --import-ownertrust

      - name: Download .deb files from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/debs
          gh release download "${{ github.event.client_payload.tag }}" \
            --repo "${{ github.event.client_payload.repo }}" \
            --pattern "*.deb" \
            --dir /tmp/debs

      - name: Verify GPG signing works
        run: |
          echo "passphrase file byte count: $(wc -c < ~/.gnupg/.pinentry-pass)"
          echo "agent socket: $(gpgconf --list-dirs agent-socket)"
          FINGERPRINT=$(gpg --with-colons --list-secret-keys | awk -F: '/^fpr/{print $10; exit}')
          echo "key fingerprint: $FINGERPRINT"
          echo "test" | gpg --local-user "$FINGERPRINT" --clearsign > /dev/null \
            && echo "direct GPG sign: OK" \
            || echo "direct GPG sign: FAILED (exit $?)"

      - name: Add packages to repo
        run: |
          for deb in /tmp/debs/*.deb; do
            reprepro -b . includedeb stable "$deb"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "add ${{ github.event.client_payload.repo }} ${{ github.event.client_payload.tag }}"
          git push
