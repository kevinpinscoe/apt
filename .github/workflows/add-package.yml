name: Add package

on:
  repository_dispatch:
    types: [new-release]

permissions:
  contents: write

jobs:
  add:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install reprepro
        run: sudo apt-get install -y reprepro

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          FINGERPRINT=$(gpg --with-colons --list-secret-keys | awk -F: '/^fpr/{print $10; exit}')
          echo "${FINGERPRINT}:6:" | gpg --import-ownertrust
          # Restart agent with preset-passphrase support enabled as a CLI flag
          gpgconf --kill gpg-agent || true
          gpg-agent --daemon --allow-preset-passphrase
          # Get keygrips from the agent itself (avoids grp: parsing issues)
          PRESET_BIN="$(gpgconf --list-dirs libexecdir)/gpg-preset-passphrase"
          while IFS= read -r KEYGRIP; do
            echo "Presetting passphrase for keygrip: $KEYGRIP"
            printf '%s' "$GPG_PASSPHRASE" | "$PRESET_BIN" --preset "$KEYGRIP"
          done < <(gpg-connect-agent 'KEYINFO --list' /bye | awk '/^S KEYINFO/{print $3}')

      - name: Download .deb files from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/debs
          gh release download "${{ github.event.client_payload.tag }}" \
            --repo "${{ github.event.client_payload.repo }}" \
            --pattern "*.deb" \
            --dir /tmp/debs

      - name: Add packages to repo
        run: |
          for deb in /tmp/debs/*.deb; do
            reprepro -b . includedeb stable "$deb"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "add ${{ github.event.client_payload.repo }} ${{ github.event.client_payload.tag }}"
          git push
