name: Add package

on:
  repository_dispatch:
    types: [new-release]

permissions:
  contents: write

jobs:
  add:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install reprepro
        run: sudo apt-get install -y reprepro

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          gpgconf --kill gpg-agent 2>/dev/null || true
          SOCK=$(gpgconf --list-dirs agent-socket 2>/dev/null || true)
          [ -n "$SOCK" ] && timeout 3 bash -c "while [ -S '$SOCK' ]; do sleep 0.1; done" || true
          printf 'allow-preset-passphrase\nallow-loopback-pinentry\n' > ~/.gnupg/gpg-agent.conf
          gpgconf --launch gpg-agent
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          FINGERPRINT=$(gpg --with-colons --list-secret-keys | awk -F: '/^fpr/{print $10; exit}')
          echo "${FINGERPRINT}:6:" | gpg --import-ownertrust
          KEYGRIP=$(gpg --with-keygrip --with-colons --list-secret-keys | awk -F: '/^grp/{print $10; exit}')
          echo "keygrip=[${KEYGRIP}] socket=$(gpgconf --list-dirs agent-socket)"
          echo "keyinfo-before: $(gpg-connect-agent 'KEYINFO --list' /bye 2>&1)"
          # Preset via assuan PRESET_PASSPHRASE (hex-encoded passphrase)
          HEX_PASS=$(printf '%s' "$GPG_PASSPHRASE" | xxd -p | tr -d '\n')
          gpg-connect-agent "PRESET_PASSPHRASE ${KEYGRIP} -1 ${HEX_PASS}" /bye
          echo "keyinfo-after: $(gpg-connect-agent 'KEYINFO --list' /bye 2>&1)"

      - name: Download .deb files from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/debs
          gh release download "${{ github.event.client_payload.tag }}" \
            --repo "${{ github.event.client_payload.repo }}" \
            --pattern "*.deb" \
            --dir /tmp/debs

      - name: Add packages to repo
        run: |
          echo "=== agent keyinfo before reprepro ==="
          gpg-connect-agent 'KEYINFO --list' /bye 2>&1
          for deb in /tmp/debs/*.deb; do
            reprepro -b . includedeb stable "$deb"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "add ${{ github.event.client_payload.repo }} ${{ github.event.client_payload.tag }}"
          git push
